apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: imagery-seg-unet
  namespace: knative-pool
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "1"
        autoscaling.knative.dev/scale-down-delay: "300s"
        autoscaling.knative.dev/target: "2"
    spec:
      containerConcurrency: 2
      timeoutSeconds: 120
      containers:
        - image: imagery-seg-unet:0.1.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: IMAGERY_TILE_BASE
              value: "https://hotosm-imagery-tile.yuiseki.com"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "3Gi"
              cpu: "2000m"
